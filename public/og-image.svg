<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#E9E1D8"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#AFC6D1" fill-opacity="0.3"/>
  <circle cx="1100" cy="530" r="200" fill="#F4A28C" fill-opacity="0.25"/>
  <circle cx="1050" cy="100" r="120" fill="#F2C66D" fill-opacity="0.3"/>
  <circle cx="150" cy="530" r="100" fill="#B7CBA3" fill-opacity="0.3"/>

  <!-- Logo circles -->
  <g transform="translate(480, 120)">
    <circle cx="70" cy="70" r="56" fill="#AFC6D1" fill-opacity="0.85"/>
    <circle cx="130" cy="70" r="56" fill="#F4A28C" fill-opacity="0.85"/>
    <circle cx="100" cy="124" r="56" fill="#F2C66D" fill-opacity="0.85"/>
    <circle cx="120" cy="100" r="44" fill="#B7CBA3" fill-opacity="0.8"/>
  </g>

  <!-- Text -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="72" font-weight="600" fill="#6E7377" text-anchor="middle">
    Montessori All Around
  </text>

  <text x="600" y="420" font-family="Arial, sans-serif" font-size="32" fill="#6E7377" fill-opacity="0.8" text-anchor="middle">
