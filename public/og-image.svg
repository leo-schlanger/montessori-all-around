  </text>

  <!-- Tagline -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="24" fill="#F4A28C" text-anchor="middle">
    Turmas Montessori | Consultoria para Pais | Formação para Educadores
  </text>

  <!-- Location -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="#6E7377" fill-opacity="0.6" text-anchor="middle">
